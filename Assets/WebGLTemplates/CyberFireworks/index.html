<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>사이버 불꽃놀이 · Cyber Fireworks</title>

    <!-- SEO / social preview -->
    <meta name="description" content="방구석에서 즐기는 여름밤 불꽃놀이 🎆 밤하늘에 불꽃을 터뜨리고, 글자를 쓰고, 해변을 꾸며보세요. A cozy fireworks night, right from your room.">
    <meta name="theme-color" content="#0c1230">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Cyber Fireworks">
    <meta property="og:title" content="사이버 불꽃놀이 · Cyber Fireworks">
    <meta property="og:description" content="방구석에서 즐기는 여름밤 불꽃놀이 🎆 밤하늘 클릭·글자 불꽃·해변 꾸미기">
    <meta property="og:image" content="https://cyber-fireworks.vercel.app/og-image.png">
    <meta property="og:url" content="https://cyber-fireworks.vercel.app/">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="사이버 불꽃놀이 · Cyber Fireworks">
    <meta name="twitter:description" content="방구석에서 즐기는 여름밤 불꽃놀이 🎆">
    <meta name="twitter:image" content="https://cyber-fireworks.vercel.app/og-image.png">

    <link rel="icon" type="image/png" sizes="64x64" href="TemplateData/favicon-64.png">
    <link rel="icon" type="image/png" sizes="32x32" href="TemplateData/favicon-32.png">
    <link rel="apple-touch-icon" href="TemplateData/apple-touch-icon.png">
    <link rel="stylesheet" href="TemplateData/style.css">
  </head>
  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width={{{ WIDTH }}} height={{{ HEIGHT }}} tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
      <div id="unity-footer">
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">{{{ PRODUCT_NAME }}}</div>
      </div>
    </div>
    <script>
      var canvas = document.querySelector("#unity-canvas");

      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/{{{ LOADER_FILENAME }}}";
      var config = {
        arguments: [],
        dataUrl: buildUrl + "/{{{ DATA_FILENAME }}}",
        frameworkUrl: buildUrl + "/{{{ FRAMEWORK_FILENAME }}}",
        codeUrl: buildUrl + "/{{{ CODE_FILENAME }}}",
        streamingAssetsUrl: "StreamingAssets",
        companyName: {{{ JSON.stringify(COMPANY_NAME) }}},
        productName: {{{ JSON.stringify(PRODUCT_NAME) }}},
        productVersion: {{{ JSON.stringify(PRODUCT_VERSION) }}},
        showBanner: unityShowBanner,
      };

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
        document.querySelector("#unity-container").className = "unity-mobile";
        canvas.className = "unity-mobile";
      } else {
        canvas.style.width = "{{{ WIDTH }}}px";
        canvas.style.height = "{{{ HEIGHT }}}px";
      }

      document.querySelector("#unity-loading-bar").style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
        }).then((unityInstance) => {
          document.querySelector("#unity-loading-bar").style.display = "none";
          document.querySelector("#unity-fullscreen-button").onclick = () => {
            unityInstance.SetFullscreen(1);
          };
        }).catch((message) => {
          alert(message);
        });
      };
      document.body.appendChild(script);
    </script>
    <div id="visitor-counter"><span id="vc-num">…</span>명이 이 밤바다를 다녀갔어요 👀</div>
    <script>
      (function(){
        fetch("https://api.counterapi.dev/v1/cf-ssolfa-2026/visit/up").then(function(r){return r.json();}).then(function(d){ var n=document.getElementById("vc-num"); if(d&&typeof d.count==="number"){ n.textContent=d.count.toLocaleString(); } else { document.getElementById("visitor-counter").style.display="none"; } }).catch(function(){ var e=document.getElementById("visitor-counter"); if(e)e.style.display="none"; });
      })();
    </script>
  </body>
</html>
